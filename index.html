<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>GRE Math Subject Test, adaptive practice (Phase 2)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fafafa; --fg: #1a1a1a; --muted: #6b6b6b; --accent: #2563eb;
    --good: #16a34a; --bad: #dc2626; --card: #ffffff; --border: #e5e7eb;
    --hover: #eff6ff; --warn: #b45309; --ok: #15803d; --pace-yellow: #ca8a04;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--fg); }
  .wrap { max-width: 920px; margin: 0 auto; padding: 18px 20px 80px; }
  header { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 18px;
    display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; }
  h1 { font-size: 20px; margin: 0 0 2px; }
  h2 { font-size: 17px; margin: 14px 0 8px; }
  h3 { font-size: 15px; margin: 10px 0 6px; }
  .sub { color: var(--muted); font-size: 13px; }
  button { font: inherit; padding: 7px 12px; border: 1px solid var(--border);
    background: white; border-radius: 6px; cursor: pointer; }
  button:hover { background: var(--hover); }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  button.primary:hover { background: #1d4ed8; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.ghost { background: transparent; }
  button.danger { background: var(--bad); color: white; border-color: var(--bad); }
  .card { background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 18px; margin: 12px 0; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .row.between { justify-content: space-between; }
  .pill { display: inline-block; font-size: 12px; padding: 2px 8px;
    border: 1px solid var(--border); border-radius: 999px; color: var(--muted);
    background: white; margin-right: 4px; }
  .pill.warn { color: var(--warn); border-color: var(--warn); }
  .pill.good { color: var(--good); border-color: var(--good); }
  .pill.bad { color: var(--bad); border-color: var(--bad); }
  .pill.accent { color: var(--accent); border-color: var(--accent); }
  .progressbar { height: 6px; background: var(--border); border-radius: 3px;
    overflow: hidden; flex: 1; min-width: 120px; }
  .progressbar > div { height: 100%; background: var(--accent); width: 0%; transition: width 0.2s; }
  .qhead { display: flex; justify-content: space-between; align-items: baseline;
    gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .qnum { font-weight: 600; color: var(--accent); }
  .stem { margin: 6px 0 14px; }
  .stem img { max-width: 100%; height: auto; display: block; margin: 12px 0;
    border: 1px solid var(--border); border-radius: 6px; background: white; padding: 6px; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
    background: white; transition: background 0.1s; }
  .opt:hover { background: var(--hover); }
  .opt.selected { background: #dbeafe; border-color: var(--accent); }
  .opt.correct { background: #dcfce7; border-color: var(--good); }
  .opt.wrong { background: #fee2e2; border-color: var(--bad); }
  .opt.reveal-correct { background: #dcfce7; border-color: var(--good); }
  .opt .letter { font-weight: 600; min-width: 18px; }
  .feedback { margin-top: 10px; padding: 10px 12px; border-radius: 8px; font-size: 14.5px; }
  .feedback.good { background: #dcfce7; border: 1px solid var(--good); color: #14532d; }
  .feedback.bad { background: #fee2e2; border: 1px solid var(--bad); color: #7f1d1d; }
  .small { font-size: 13px; color: var(--muted); }
  .right { text-align: right; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 18px; }
  .kbd { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; background: #f3f4f6; padding: 1px 6px; border-radius: 4px;
    border: 1px solid var(--border); }
  .errbox { background: #fee2e2; border: 1px solid var(--bad); color: #7f1d1d;
    padding: 10px 12px; border-radius: 8px; margin: 10px 0; }
  hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal-box { background: white; border-radius: 10px; padding: 20px 22px;
    max-width: 460px; width: 92%; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-height: 88vh; overflow-y: auto; }
  .modal-box h2 { margin-top: 0; }
  .modal-box input[type="password"], .modal-box input[type="text"], .modal-box input[type="date"],
  .modal-box textarea {
    width: 100%; padding: 9px 11px; font: inherit; border: 1px solid var(--border);
    border-radius: 6px; margin-top: 6px; }
  .modal-box .row { margin-top: 12px; justify-content: flex-end; }
  /* Header bits */
  .profile-tag { font-size: 13px; color: var(--muted); }
  .profile-tag b { color: var(--fg); }
  /* Timer */
  .timerbar { display: flex; align-items: center; gap: 12px;
    background: white; border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; margin-bottom: 10px; }
  .clock { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 16px; font-weight: 600; }
  .pace-dot { width: 10px; height: 10px; border-radius: 50%; }
  .pace-dot.green { background: var(--good); }
  .pace-dot.yellow { background: var(--pace-yellow); }
  .pace-dot.red { background: var(--bad); }
  /* Star, marks */
  .star-btn { background: transparent; border: none; cursor: pointer;
    font-size: 20px; line-height: 1; padding: 0 4px; color: #d1d5db; }
  .star-btn.starred { color: #f59e0b; }
  .star-btn:hover { color: #f59e0b; }
  /* Chat */
  .chat-panel { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px;
    padding: 12px; margin-top: 10px; }
  .chat-context { background: #fef3c7; border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; font-size: 13px; }
  .chat-context summary { cursor: pointer; font-weight: 600; }
  .chat-msgs { max-height: 360px; overflow-y: auto; padding: 6px 2px; }
  .chat-msg { padding: 8px 10px; border-radius: 8px; margin: 4px 0; }
  .chat-msg.user { background: #dbeafe; margin-left: 24px; }
  .chat-msg.assistant { background: white; border: 1px solid #fcd34d; margin-right: 24px; }
  .chat-msg .who { font-size: 11px; color: var(--muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
  .chat-input { width: 100%; min-height: 56px; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 6px; font: inherit; resize: vertical; }
  /* Heatmap */
  .heatmap { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
  .heatcell { padding: 10px 10px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border); color: white; font-size: 13px; line-height: 1.25; }
  .heatcell.untested { background: #e5e7eb; color: var(--muted); }
  .heatcell .acc { font-weight: 600; font-size: 15px; }
  /* Tabs */
  .tabs { display: flex; gap: 4px; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .tab { padding: 8px 12px; cursor: pointer; border: 1px solid transparent;
    border-bottom: none; border-radius: 6px 6px 0 0; font-size: 14px; color: var(--muted); }
  .tab.active { background: white; border-color: var(--border); color: var(--fg); font-weight: 600; }
  /* Notes textarea inside question card */
  .note-area { width: 100%; min-height: 50px; padding: 6px 8px; border: 1px solid var(--border);
    border-radius: 6px; font: inherit; margin-top: 4px; font-size: 13.5px; }
  /* Insight card */
  .insight { background: #eef2ff; border: 1px solid #c7d2fe; padding: 10px 12px;
    border-radius: 8px; color: #312e81; }
  /* Generated mini-quiz */
  .gen-q { border-left: 3px solid var(--accent); padding: 8px 10px; margin: 8px 0; background: white; border-radius: 4px; }
  .gen-q.correct { border-left-color: var(--good); background: #f0fdf4; }
  .gen-q.wrong { border-left-color: var(--bad); background: #fef2f2; }
  /* Test-day */
  .countdown { font-size: 28px; font-weight: 700; color: var(--accent); }
  .checklist li { margin: 4px 0; }
  /* Heatmap detail list */
  .qsublist { list-style: none; padding: 0; margin: 0; }
  .qsublist li { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; margin: 4px 0; background: white; }
  .qsublist li .qmeta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  /* Toast (F2 report-error confirmation) */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1f2937; color: white; padding: 10px 16px; border-radius: 8px;
    font-size: 14px; box-shadow: 0 4px 14px rgba(0,0,0,0.25); z-index: 1100; }
  .toast.bad { background: var(--bad); }
  /* Topic-filter chips (F1) */
  .topic-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .topic-chip { font-size: 12px; padding: 4px 9px; border: 1px solid var(--border);
    border-radius: 999px; cursor: pointer; background: white; color: var(--muted); user-select: none; }
  .topic-chip.selected { background: var(--accent); color: white; border-color: var(--accent); }
  .topic-chip.allchip { font-weight: 600; }
  /* Report-error button on question card */
  .report-btn { font-size: 12px; padding: 3px 8px; color: var(--muted); background: transparent;
    border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }
  .report-btn:hover { color: var(--bad); border-color: var(--bad); }
  /* Pause overlay (F5) */
  .paused-dim { opacity: 0.35; pointer-events: none; }
</style>
</head>
<body>

<!-- Netlify Forms hidden form for F2 question-error reporting.
     The build crawler picks this up so submissions are accepted.
     Steve must enable Forms notifications in the Netlify dashboard
     to receive emails at sthubbar@gmail.com. -->
<form name="question-error" netlify netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="question-error" />
  <input type="text" name="bot-field" />
  <input type="text" name="qid" />
  <input type="text" name="profile" />
  <input type="text" name="type" />
  <textarea name="description"></textarea>
  <input type="text" name="userAgent" />
</form>

<div class="wrap">

<header>
  <div>
    <h1>GRE Math Subject Test, adaptive practice</h1>
    <div class="sub">Phase 2: profiles, chat tutor, timed modes, heatmap, patterns.</div>
  </div>
  <div class="profile-tag" id="profile-tag"></div>
</header>

<div id="app"></div>

</div>

<script>
"use strict"; /*PROBE_EDIT_VERIFY_2*/

// ==========================================================================
// localStorage schema (all values JSON-stringified unless noted otherwise).
// "<profile>" is the active profile name (default "kai", per-profile data).
// "<qid>" is a question id like "GR3768-Q1".
// ==========================================================================
//   gre.profiles                                -> array of profile objects [{name, created}, ...]
//   gre.active_profile                          -> string profile name (last selected)
//   gre_app_password                            -> string (raw, NOT JSON), tutor password
//
//   profile:<profile>:history                   -> { qid: {attempts, correct, streak, bucket, leitnerBox, lastSeen, lastResult, nextReview} }
//   profile:<profile>:log                       -> array of attempts [{qid, ts, mode, chosen, correct, time_sec}]
//   profile:<profile>:sessions                  -> array of completed session summaries
//   profile:<profile>:settings                  -> object {length: N}
//   profile:<profile>:bookmarks                 -> { qid: {starred:bool, note:string} }
//   profile:<profile>:rules                     -> { ruleId: {id,text,qid,box,lastSeen,lastResult} }
//   profile:<profile>:patterns                  -> array [{ts, insight, sinceTs}] (rolling, recent first, capped)
//   profile:<profile>:patterns_history          -> array [{ts, insight}] (F6, full history capped 50)
//   profile:<profile>:testday                   -> ISO date string for target test day
//   profile:<profile>:session.current           -> object, in-progress session (resume)
//   profile:<profile>:topic_filter              -> array of canonical topic strings (F1, last-used)
//   profile:<profile>:custom_mode               -> object {length:N, minutes:M} (F5, last custom mock)
//   profile:<profile>:chat:<qid>                -> array of chat messages [{role, content, ts?}], capped 30 (F4)
// ==========================================================================

// ==========================================================================
// Configuration
// ==========================================================================
const QUESTIONS_URL = "questions.json";
const TUTOR_URL = "/.netlify/functions/tutor";
const HEALTH_URL = "/.netlify/functions/health";
const GENERATE_URL = "/.netlify/functions/generate";
const PATTERN_URL = "/.netlify/functions/pattern";

// Leitner interval ladder, in DAYS. The Nth entry is the delay applied when a
// question is promoted into box N (1-indexed). A correct answer in box K sets
// next_review = now + LEITNER_INTERVALS_DAYS[K-1] days.
const LEITNER_INTERVALS_DAYS = [1, 3, 7, 14, 30];
// After this many consecutive correct answers, a question exits Learning into
// Mastered and stops appearing in normal selection.
const MASTERY_STREAK = 3;

// Rule-recall Leitner.
const RULE_BOX_MAX = 5;

// Pattern detection trigger.
const PATTERN_THRESHOLD = 30;
const PATTERN_KEEP = 5;

// ETS scaled-score lookup (approximation, raw correct out of 66 -> scaled).
// Reused/extended from Phase 1.
const ETS_SCALE = [
  [0,200],[5,400],[10,500],[15,560],[20,610],[25,650],[30,690],
  [33,710],[36,730],[39,750],[42,770],[45,790],[48,810],[51,830],
  [54,850],[57,870],[60,890],[63,910],[66,930]
];

// Modes.
const MODES = {
  practice: { label: "Practice (untimed)", timed: false, length: null },
  sprint:   { label: "Sprint",  timed: true,  length: 10, minutes: 25 },
  quarter:  { label: "Quarter", timed: true,  length: 17, minutes: 42 },
  mock:     { label: "Mock",    timed: true,  length: 66, minutes: 170 },
};

// Canonical topic taxonomy (must match generator and questions.json).
const CANONICAL_TOPICS = [
  "calculus","linear_algebra","real_analysis","abstract_algebra","complex_analysis",
  "topology","discrete_math","probability","number_theory","differential_equations",
  "geometry","foundations_logic","numerical_methods","algorithms_combinatorics",
  "statistics","precalculus_trig",
];

// ==========================================================================
// Profile-aware localStorage
// ==========================================================================
const LS_GLOBAL_PROFILES = "gre.profiles";   // [{name, created}]
const LS_GLOBAL_ACTIVE = "gre.active_profile";
const LS_GLOBAL_PASSWORD = "gre_app_password";

function lsLoad(key, fallback) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
  catch (e) { return fallback; }
}
function lsSave(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}

function profileKey(suffix) {
  return "profile:" + (STATE.activeProfile || "kai") + ":" + suffix;
}

// ==========================================================================
// State
// ==========================================================================
const STATE = {
  questions: [],
  byId: {},
  activeProfile: "kai",
  history: {},          // qid -> {attempts, correct, streak, bucket, leitnerBox, lastSeen, lastResult, nextReview}
  log: [],              // [{qid, ts, mode, chosen, correct, time_sec}]
  sessions: [],         // completed sessions
  settings: { length: 20 },
  bookmarks: {},        // qid -> {starred:bool, note:string}
  rules: {},            // ruleId -> {text, qid, box, lastSeen, lastResult}
  patterns: [],         // [{ts, insight}] (recent surfaced patterns, capped at PATTERN_KEEP)
  patternsHistory: [],  // F6: [{ts, insight}] full history, capped 50
  testDay: null,        // ISO date string
  currentSession: null, // saved partial session (resume)
  ruleQuiz: null,       // active rule recall quiz
  topicFilter: [],      // F1: array of selected canonical topic strings (empty = all topics)
  customMode: { length: 30, minutes: 80 }, // F5: last custom mock settings
  // ephemeral chat-tutor state per question, in memory only is fine because chat is also persisted to LS.
};

// F6: cap on patterns history list.
const PATTERNS_HISTORY_KEEP = 50;
// F4: cap on stored chat messages per question.
const CHAT_HISTORY_KEEP = 30;

// ==========================================================================
// Utilities
// ==========================================================================
function $el(tag, props = {}, children = []) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props || {})) {
    if (v == null) continue;
    if (k === "class") e.className = v;
    else if (k === "html") e.innerHTML = v;
    else if (k === "text") e.textContent = v;
    else if (k.startsWith("on") && typeof v === "function") {
      e.addEventListener(k.slice(2).toLowerCase(), v);
    } else {
      e.setAttribute(k, v);
    }
  }
  for (const c of (children || [])) {
    if (c == null) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }
function nowIso() { return new Date().toISOString(); }
function dayMs(n) { return n * 24 * 60 * 60 * 1000; }
function shuffleInPlace(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function todayISODate() { return new Date().toISOString().slice(0, 10); }
function fmtMMSS(sec) {
  if (sec == null || isNaN(sec)) return "--:--";
  sec = Math.max(0, Math.floor(sec));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
}
function escapeHTML(s) {
  return (s || "").toString()
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

// safeMathHTML: split text on KaTeX math delimiters ($$...$$, $...$, \(...\), \[...\]).
// Math segments are passed through verbatim so KaTeX auto-render can process them.
// Non-math segments get HTML-escaped so user-typed "<" in choice text does not get
// parsed as the start of an HTML tag. Whitelisted simple tags (br, b, i, sup, sub,
// em, strong) are allowed because the question bank uses them (e.g. GR3768-Q36, Q64).
function safeMathHTML(s) {
  if (s == null) return "";
  s = s.toString();
  // Tokenize math segments. Order matters: try $$ before $, and \[ before \(.
  const re = /(\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\)|\$[^\$\n]*?\$)/g;
  const parts = [];
  let lastIdx = 0;
  let m;
  while ((m = re.exec(s)) !== null) {
    if (m.index > lastIdx) parts.push({ math: false, text: s.slice(lastIdx, m.index) });
    parts.push({ math: true, text: m[0] });
    lastIdx = m.index + m[0].length;
  }
  if (lastIdx < s.length) parts.push({ math: false, text: s.slice(lastIdx) });

  const out = [];
  for (const p of parts) {
    if (p.math) {
      // Math segments: ALSO escape HTML entities. The browser decodes
      // &lt;/&gt;/&amp; back into <,>,& in the text node, and KaTeX auto-render
      // then parses the math correctly. Without this escape, raw "<" inside
      // \(0<x<2\) gets eaten by the HTML parser before KaTeX sees it.
      out.push(
        p.text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
      );
    } else {
      // Non-math: escape, then restore whitelisted tags.
      let t = p.text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
      // Restore safe tags: <br>, <br/>, <br />, <b>, </b>, <i>, </i>, <sup>, </sup>,
      // <sub>, </sub>, <em>, </em>, <strong>, </strong>.
      t = t.replace(/&lt;(\/?)(br|b|i|sup|sub|em|strong)(\s*\/?)&gt;/gi, "<$1$2$3>");
      out.push(t);
    }
  }
  return out.join("");
}

function renderMath(node) {
  if (window.renderMathInElement) {
    window.renderMathInElement(node, {
      delimiters: [
        { left: "\\(", right: "\\)", display: false },
        { left: "\\[", right: "\\]", display: true },
        { left: "$$", right: "$$", display: true },
        { left: "$", right: "$", display: false },
      ],
      throwOnError: false,
      strict: false,
    });
  }
}

// Accuracy fraction (0-1) -> ETS scaled score via the same table.
function accuracyToScore(p) {
  if (typeof p !== "number" || isNaN(p)) return null;
  const c = Math.round(Math.max(0, Math.min(1, p)) * 66);
  return etsScaledScore(c, 66);
}

// ETS scale lookup, linear interp.
function etsScaledScore(correct, total) {
  if (!total) return null;
  const proportional = (correct / total) * 66;
  for (let i = 0; i < ETS_SCALE.length - 1; i++) {
    const [r1, s1] = ETS_SCALE[i];
    const [r2, s2] = ETS_SCALE[i + 1];
    if (proportional >= r1 && proportional <= r2) {
      const t = (proportional - r1) / (r2 - r1);
      return Math.round(s1 + t * (s2 - s1));
    }
  }
  return ETS_SCALE[ETS_SCALE.length - 1][1];
}

// ==========================================================================
// Profile management
// ==========================================================================
function getProfiles() {
  let list = lsLoad(LS_GLOBAL_PROFILES, null);
  if (!list || !Array.isArray(list) || list.length === 0) {
    list = [{ name: "kai", created: nowIso() }, { name: "steve", created: nowIso() }];
    lsSave(LS_GLOBAL_PROFILES, list);
  }
  return list;

// ==========================================================================
// History
// ==========================================================================
function defaultHistory(qid) {
  return {
    id: qid, attempts: 0, correct: 0, streak: 0,
    bucket: "new", leitnerBox: 1, lastSeen: null, lastResult: null,
    nextReview: nowIso(),
  };
}
function getH(qid) {
  if (!STATE.history[qid]) STATE.history[qid] = defaultHistory(qid);
  return STATE.history[qid];
}
function recordAttempt(qid, chosenIdx, correct, mode, timeSec) {
  const h = getH(qid);
  // wasDue gates promotion and the mastery streak (Steve directive 2026-06-04).
  // Extra practice WITHIN an active Leitner interval still gets logged, but
  // does not advance the box or count toward Mastered. Otherwise repeating a
  // card 3 times in one hour would falsely mark it Mastered.
  const wasDue = (h.attempts === 0) ||
                 (h.bucket === "new") ||
                 (h.nextReview == null) ||
                 (new Date(h.nextReview) <= new Date());
  h.attempts += 1;
  h.lastSeen = nowIso();
  h.lastResult = correct ? "correct" : "wrong";
  if (correct) {
    h.correct += 1;
    if (wasDue && h.bucket !== "mastered") {
      h.streak += 1;
      if (h.streak >= MASTERY_STREAK) {
        h.bucket = "mastered";
        h.nextReview = null;
      } else {
        h.bucket = "learning";
        // Use the CURRENT box's interval, then advance the box. The previous
        // ordering incremented first, skipping LEITNER_INTERVALS_DAYS[0] (the
        // 1-day entry) so the first correct landed on a 3-day delay instead.
        // Steve directive 2026-06-04.
        const days = LEITNER_INTERVALS_DAYS[h.leitnerBox - 1];
        h.nextReview = new Date(Date.now() + dayMs(days)).toISOString();
        h.leitnerBox = Math.min(h.leitnerBox + 1, LEITNER_INTERVALS_DAYS.length);
      }
    }
    // If !wasDue: bucket, streak, and nextReview stay where they were.
  } else {
    // Wrong answer. Demote one box (never below 1) and mark due immediately so
    // the question reappears in the very next session, not 24 hours later.
    // This matches Steve's spaced-repetition expectation (2026-06-02): missed
    // questions should be drilled now, recently-correct ones should rest.
    h.streak = 0;
    h.bucket = "learning";
    h.leitnerBox = Math.max(1, h.leitnerBox - 1);
    h.nextReview = nowIso();
  }
  STATE.log.push({ qid, ts: nowIso(), mode, chosen: chosenIdx, correct: !!correct, time_sec: timeSec });
  saveAll();
}

function classify(qid) {
  const h = STATE.history[qid];
  if (!h || h.attempts === 0) return "new";
  if (h.bucket === "mastered") return "mastered";
  if (h.bucket === "learning" && h.nextReview && new Date(h.nextReview) <= new Date()) return "review_due";
  return "learning_not_due";
}
// Only "active" questions are eligible for selection or counts. Anything with a
// different status (e.g. "retired") is filtered out everywhere upstream.
function isActiveQ(q) {
  return q && (q.status == null || q.status === "active");
}
function activeQuestions() {
  return STATE.questions.filter(isActiveQ);
}

// F1: question matches the current topic filter? Empty filter = all questions match.
function matchesTopicFilter(q, filterArr) {
  const f = filterArr || STATE.topicFilter || [];
  if (!f || f.length === 0) return true;
  const t = q.topics || [];
  for (const sel of f) { if (t.includes(sel)) return true; }
  return false;
}
// Active questions, optionally further restricted to the topic filter.
function filteredActiveQuestions(filterArr) {
  return activeQuestions().filter(q => matchesTopicFilter(q, filterArr));
}
function bucketCounts() {
  const out = { new: 0, review_due: 0, learning_not_due: 0, mastered: 0 };
  for (const q of activeQuestions()) out[classify(q.id)] += 1;
  return out;
}

function selectAdaptive(length) {
  // Priority order (Steve directive 2026-06-02):
  //   1. review_due: questions whose Leitner interval has elapsed (overdue
  //      promotions) OR wrong-answer rebooks (due immediately). Drill these.
  //   2. new: questions never attempted.
  //   3. learning_not_due: questions still inside their Leitner spacing.
  //      Only pulled as fill when the first two pools cannot fill the session.
  //   4. mastered: pulled only as last-resort fill.
  // This replaces the prior fixed 60/30/10 mix, which had the unintended
  // effect of preferring NOT-due questions and surfacing same-session repeats.
  const buckets = { new: [], review_due: [], learning_not_due: [], mastered: [] };
  for (const q of filteredActiveQuestions()) buckets[classify(q.id)].push(q.id);
  for (const k of Object.keys(buckets)) shuffleInPlace(buckets[k]);
  const picked = []; const seen = new Set();
  function take(pool, n) {
    while (n > 0 && pool.length > 0) {
      const id = pool.shift();
      if (seen.has(id)) continue;
      seen.add(id); picked.push(id); n--;
    }
  }
  take(buckets.review_due, length);
  if (picked.length < length) take(buckets.new, length - picked.length);
  if (picked.length < length) take(buckets.learning_not_due, length - picked.length);
  if (picked.length < length) take(buckets.mastered, length - picked.length);
  shuffleInPlace(picked);
  return picked;
}
function selectRandom(length) {
  const ids = filteredActiveQuestions().map(q => q.id);
  shuffleInPlace(ids);
  return ids.slice(0, length);
}

// Bookmarked-question selector. Active + topic-filter + currently-starred only.
function selectBookmarks(length) {
  const starred = new Set(
    Object.entries(STATE.bookmarks || {})
      .filter(([_, v]) => v && v.starred)
      .map(([qid, _]) => qid)
  );
  const ids = filteredActiveQuestions()
    .filter(q => starred.has(q.id))
    .map(q => q.id);
  shuffleInPlace(ids);
  return ids.slice(0, Math.min(length, ids.length));
}
function bookmarkedActiveCount() {
  const starred = new Set(
    Object.entries(STATE.bookmarks || {})
      .filter(([_, v]) => v && v.starred)
      .map(([qid, _]) => qid)
  );
  return filteredActiveQuestions().filter(q => starred.has(q.id)).length;
}

// Final-week mode prioritizes weak topics.
function selectFinalWeek(length) {
  // accuracy per topic
  const topicAcc = computeTopicAccuracy();
  const weakOrder = Object.entries(topicAcc)
    .sort((a, b) => (a[1].acc ?? 1) - (b[1].acc ?? 1))
    .map(([t]) => t);
  const picked = []; const seen = new Set();
  const pool = filteredActiveQuestions();
  for (const t of weakOrder) {
    for (const q of pool) {
      if (seen.has(q.id)) continue;
      if ((q.topics || []).includes(t)) { seen.add(q.id); picked.push(q.id); }
      if (picked.length >= length) break;
    }
    if (picked.length >= length) break;
  }
  if (picked.length < length) {
    for (const q of pool) {
      if (seen.has(q.id)) continue;
      seen.add(q.id); picked.push(q.id);
      if (picked.length >= length) break;
    }
  }
  return picked.slice(0, length);
}

// ==========================================================================
// Topic accuracy / heatmap data
// ==========================================================================
function computeTopicAccuracy() {
  const out = {};
  for (const t of CANONICAL_TOPICS) out[t] = { attempts: 0, correct: 0, qids: new Set() };
  for (const q of STATE.questions) {
    for (const t of (q.topics || [])) {
      if (!out[t]) out[t] = { attempts: 0, correct: 0, qids: new Set() };
      out[t].qids.add(q.id);
    }
  }
  for (const e of STATE.log) {
    const q = STATE.byId[e.qid];
    if (!q) continue;
    for (const t of (q.topics || [])) {
      if (!out[t]) continue;
      out[t].attempts += 1;
      if (e.correct) out[t].correct += 1;
    }
  }
  for (const t of Object.keys(out)) {
    const v = out[t];
    v.acc = v.attempts ? v.correct / v.attempts : null;
    v.bankSize = v.qids.size;
    delete v.qids;
  }
  return out;
}

// ==========================================================================
// Rule extraction (from tutor replies)
// ==========================================================================
function extractRule(text) {
  if (!text) return null;
  const m = text.match(/(?:^|\n)\s*Rule:\s*([^\n]+)/i);
  if (m) return m[1].trim();
  // Fallback: last sentence if it looks rule-like.
  const sentences = text.trim().split(/(?<=[.!?])\s+/);
  const last = sentences[sentences.length - 1] || "";
  if (last.toLowerCase().startsWith("rule:")) return last.replace(/^rule:\s*/i, "").trim();
  return null;
}
function recordRule(qid, ruleText) {
  if (!ruleText) return;
  const key = qid + "::" + ruleText.slice(0, 80);
  if (!STATE.rules[key]) {
    STATE.rules[key] = { id: key, text: ruleText, qid, box: 1, lastSeen: nowIso(), lastResult: null };
  } else {
    STATE.rules[key].text = ruleText;
    STATE.rules[key].lastSeen = nowIso();
  }
  saveAll();
}

// ==========================================================================
// Wrong-answer pattern detection
// ==========================================================================
async function maybeRunPatternDetection() {
  const wrongs = STATE.log.filter(e => !e.correct);
  // Determine count since last detection.
  const lastDetectedTs = STATE.patterns.length ? STATE.patterns[0].sinceTs : null;
  const newWrongs = lastDetectedTs ? wrongs.filter(e => e.ts > lastDetectedTs) : wrongs;
  if (newWrongs.length < PATTERN_THRESHOLD) return;

  const window = newWrongs.slice(-PATTERN_THRESHOLD);
  const misses = window.map(e => {
    const q = STATE.byId[e.qid];
    if (!q) return null;
    return {
      question: (q.stem || "").slice(0, 240),
      chosen: q.options[e.chosen] || "",
      correct: q.options[q.answer] || "",
      topic: (q.topics || []).join("/"),
    };
  }).filter(Boolean);

  let pw = getPassword();
  if (!pw) return;
  try {
    const resp = await fetch(PATTERN_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ misses, password: pw }),
    });
    if (!resp.ok) return;
    const j = await resp.json();
    if (!j.insight) return;
    const tsNow = nowIso();
    STATE.patterns.unshift({ ts: tsNow, insight: j.insight, sinceTs: window[window.length - 1].ts });
    if (STATE.patterns.length > PATTERN_KEEP) STATE.patterns = STATE.patterns.slice(0, PATTERN_KEEP);
    // F6: also append to full history (capped 50, recent first).
    if (!Array.isArray(STATE.patternsHistory)) STATE.patternsHistory = [];
    STATE.patternsHistory.unshift({ ts: tsNow, insight: j.insight });
    if (STATE.patternsHistory.length > PATTERNS_HISTORY_KEEP) {
      STATE.patternsHistory = STATE.patternsHistory.slice(0, PATTERNS_HISTORY_KEEP);
    }
    saveAll();
  } catch (e) { /* best-effort */ }
}

  // Build a small adaptive-style pool for this topic, using the standard selector
  // with the topic filter temporarily set to just this topic.
  const prevFilter = STATE.topicFilter ? STATE.topicFilter.slice() : [];
  STATE.topicFilter = [topic];
  let ids = selectAdaptive(length || 5);
  // Restore prior filter (the user's persistent choice should not be overwritten).
  STATE.topicFilter = prevFilter;
  saveAll();
  if (!ids || ids.length === 0) {

  if (ids.length === 1) { startSingleQuestionReview(ids[0]); return; }
  const session = {
    mode: "topic-drill:" + topic,
    timed: false,
    minutes: null,
    length: ids.length,
    ids,
    idx: 0,
    answers: {},
    confirmed: {},
    marked: {},
    chats: {},
    questionStartTs: nowIso(),
    startedAt: nowIso(),
    endsAt: null,
    completed: false,
    pausedAt: null,
    totalPausedMs: 0,
  };
  STATE.currentSession = session;
  persistSession();
  renderQuestion();
}

  }));

  // Test day.
  w.appendChild($el("hr"));
  const td = $el("div", { class: "row between" });
  td.appendChild($el("div", { html: STATE.testDay
    ? `Target test date: <b>${STATE.testDay}</b> (${daysToTest()} day${daysToTest() === 1 ? "" : "s"})`

  }));
  td.appendChild($el("button", { text: "Set", onclick: () => promptSetTestDay() }));
  w.appendChild(td);

  if (STATE.testDay && daysToTest() <= 14 && daysToTest() >= 0) {
    w.appendChild($el("hr"));
    w.appendChild($el("h3", { text: "Final-week checklist" }));
    const ul = $el("ul", { class: "checklist" });
    for (const item of [
      "Two full Mock tests this week (different days).",
      "Drill the bottom-2 weakest topics on the heatmap each day.",
      "Review starred questions and notes.",
      "Sleep 8 hours the night before.",
      "Bring photo ID, admission ticket, water, snack.",
    ]) ul.appendChild($el("li", { text: item }));
    w.appendChild(ul);
  }

  // ETS-equivalent score trend, via inline canvas + Chart.js lazy load.
  if (STATE.sessions.length > 0) {
    w.appendChild($el("hr"));
    w.appendChild($el("h3", { text: "Estimated GRE score (Bayesian, 90% band)" }));
    const canvas = $el("canvas", { id: "trendChart", height: "240" });
    canvas.style.maxHeight = "280px";
    w.appendChild(canvas);
    setTimeout(() => drawTrendChart(canvas), 50);
  }
  return w;
}

function computeStreak() {
  let s = 0;
  for (let i = STATE.log.length - 1; i >= 0; i--) {
    if (STATE.log[i].correct) s++; else break;
  }
  return s;
}
function computeDaysPracticed() {
  const days = new Set();
  for (const e of STATE.log) days.add(e.ts.slice(0, 10));
  return days.size;
}
function computeHoursEstimate() {
  // Sum session durations if available; else 1 minute per attempt rough fallback.
  let totalSec = 0;
  for (const s of STATE.sessions) {
    if (s.startedAt && s.endedAt) {
      totalSec += (new Date(s.endedAt).getTime() - new Date(s.startedAt).getTime()) / 1000;
    } else {
      totalSec += (s.answered || 0) * 90;
    }
  }
  return totalSec / 3600;
}
function daysToTest() {
  if (!STATE.testDay) return null;
  const t = new Date(STATE.testDay + "T00:00:00").getTime();
  const now = Date.now();
  return Math.ceil((t - now) / dayMs(1));
}

// Lazy-load Chart.js once.
let chartJsLoading = null;
function ensureChartJs() {
  if (window.Chart) return Promise.resolve();
  if (chartJsLoading) return chartJsLoading;
  chartJsLoading = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js";
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
  return chartJsLoading;
}

async function drawTrendChart(canvas) {
  // Bayesian posterior estimate of accuracy, mapped to GRE scaled score.
  // For each session boundary we compute Beta(alpha, beta) posterior over the
  // user's underlying accuracy, using all attempts to date with exponential
  // decay (recent attempts weighted more). Shows the posterior mean as a thick
  // line plus a 90% credible-interval band that narrows as N grows.
  // Per-session correct/wrong counts are stacked bars on a secondary axis.
  await ensureChartJs();
  const sessions = STATE.sessions || [];
  if (sessions.length === 0) return;

  const LAMBDA = 0.985;         // per-attempt decay, ~70-attempt effective window
  const PRIOR_ALPHA = 2;        // prior pseudo-counts
  const PRIOR_BETA = 2;

  let softC = 0, softN = 0;
  const points = [];
  for (const s of sessions) {
    const cnt = s.answered || 0;
    if (cnt === 0) continue;
    const c = s.correct || 0;
    const w = (typeof s.wrong === "number") ? s.wrong : (cnt - c);
    const decay = Math.pow(LAMBDA, cnt);
    softC *= decay;
    softN *= decay;
    softC += c;
    softN += cnt;
    const alpha = PRIOR_ALPHA + softC;
    const beta = PRIOR_BETA + (softN - softC);
    const mu = alpha / (alpha + beta);
    const sigma = Math.sqrt(alpha * beta / (Math.pow(alpha + beta, 2) * (alpha + beta + 1)));
    const lo = Math.max(0, mu - 1.645 * sigma);
    const hi = Math.min(1, mu + 1.645 * sigma);
    points.push({
      label: (s.endedAt || s.startedAt || "").slice(0, 10),
      attempted: cnt, correct: c, wrong: w,
      muScore: accuracyToScore(mu),
      loScore: accuracyToScore(lo),
      hiScore: accuracyToScore(hi),
    });
  }
  if (points.length === 0) return;

  const labels = points.map((p, i) => `S${i + 1}`);
  if (canvas._chart) canvas._chart.destroy();
  canvas._chart = new Chart(canvas, {
    data: {
      labels,
      datasets: [
        // Lower bound (invisible line; serves as the fill anchor).
        {
          type: "line", label: "Lower 90%",
          data: points.map(p => p.loScore),
          borderColor: "rgba(37, 99, 235, 0)",
          pointRadius: 0, yAxisID: "yScore",
        },
        // Upper bound; fills back to previous dataset (the lower bound).
        {
          type: "line", label: "Upper 90%",
          data: points.map(p => p.hiScore),
          borderColor: "rgba(37, 99, 235, 0)",
          backgroundColor: "rgba(37, 99, 235, 0.15)",
          fill: "-1", pointRadius: 0, yAxisID: "yScore",
        },
        // Middle estimate (thick line).
        {
          type: "line", label: "Estimated GRE score",
          data: points.map(p => p.muScore),
          borderColor: "#2563eb", backgroundColor: "#2563eb",
          borderWidth: 3, tension: 0.25, pointRadius: 3,
          yAxisID: "yScore",
        },
        // Per-session bars: correct + wrong, stacked, on right axis.
        {
          type: "bar", label: "Correct",
          data: points.map(p => p.correct),
          backgroundColor: "rgba(34, 197, 94, 0.7)",
          stack: "session", yAxisID: "yCount",
        },
        {
          type: "bar", label: "Wrong",
          data: points.map(p => p.wrong),
          backgroundColor: "rgba(239, 68, 68, 0.7)",
          stack: "session", yAxisID: "yCount",
        },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      scales: {
        yScore: { type: "linear", position: "left",
          suggestedMin: 400, suggestedMax: 990,
          title: { display: true, text: "Estimated GRE score" },
        },
        yCount: { type: "linear", position: "right",
          beginAtZero: true, grid: { display: false },
          title: { display: true, text: "Questions per session" },
        },
      },
      plugins: {
        legend: { position: "bottom", labels: { boxWidth: 12, font: { size: 11 },
          filter: (item) => item.text !== "Lower 90%" && item.text !== "Upper 90%" } },
        tooltip: {
          callbacks: {
            afterBody: (items) => {
              if (!items || items.length === 0) return "";
              const p = points[items[0].dataIndex];
              return `${p.attempted} questions on ${p.label}\n90% band: ${p.loScore} to ${p.hiScore}`;
            },
          },
        },
      },
    },
  });
}

function renderTopicsHeatmap() {
  const w = $el("div");
  const acc = computeTopicAccuracy();
  const grid = $el("div", { class: "heatmap" });
  for (const t of CANONICAL_TOPICS) {
    const v = acc[t];
    const cell = $el("div", { class: "heatcell" });
    if (!v || v.attempts === 0) {
      cell.classList.add("untested");
      cell.innerHTML = `<div>${t}</div><div class="acc">untested</div><div style="font-size:11px;">${v ? v.bankSize : 0} in bank</div>`;
    } else {
      const a = v.acc;
      // red->yellow->green
      let bg;
      if (a < 0.5) bg = `hsl(${Math.round(a * 80)}, 70%, 45%)`;
      else if (a < 0.8) bg = `hsl(${Math.round(45 + a * 40)}, 65%, 42%)`;
      else bg = `hsl(${Math.round(120 + (a - 0.8) * 30)}, 65%, 38%)`;
      cell.style.background = bg;
      cell.innerHTML = `<div>${t}</div><div class="acc">${Math.round(a * 100)}%</div><div style="font-size:11px;">${v.correct}/${v.attempts} on ${v.bankSize}</div>`;
    }
    cell.addEventListener("click", () => drillTopic(t));
    grid.appendChild(cell);
  }
  w.appendChild(grid);
  return w;
}

async function drillTopic(topic) {
  const wrap = $el("div");
  // F3: action row to start a focused session right from the heatmap.
  const actionRow = $el("div", { class: "row", style: "margin-bottom: 10px;" });
  actionRow.appendChild($el("button", {
    class: "primary", text: "Start 5-question drill",
    onclick: () => {
      // Close the modal then start the session.
      const overlay = document.querySelector(".modal-overlay");
      if (overlay) document.body.removeChild(overlay);
      startTopicSession(topic, 5);
    },
  }));
  actionRow.appendChild($el("button", {
    text: "1-question drill",
    onclick: () => {
      const overlay = document.querySelector(".modal-overlay");
      if (overlay) document.body.removeChild(overlay);
      startTopicSession(topic, 1);
    },
  }));
  wrap.appendChild(actionRow);

  wrap.appendChild($el("div", { class: "small", text: `${topic}: questions in bank.` }));
  const ul = $el("ul", { class: "qsublist" });
  for (const q of STATE.questions) {
    if (!(q.topics || []).includes(topic)) continue;
    const h = STATE.history[q.id] || { attempts: 0, correct: 0, bucket: "new" };
    const li = $el("li");

function startRuleQuiz() {
  const all = Object.values(STATE.rules);
  if (all.length < 4) { alert("Need at least 4 rules learned for the recall mini-quiz."); return; }
  // Pick lowest-box first as the target.
  all.sort((a, b) => a.box - b.box);
  const target = all[0];
  const distractors = all.filter(r => r.id !== target.id);
  shuffleInPlace(distractors);
  const opts = [target, distractors[0], distractors[1], distractors[2]];
  shuffleInPlace(opts);
  STATE.ruleQuiz = { target, opts };
  renderRuleQuizModal();
}

function renderRuleQuizModal() {
  const { target, opts } = STATE.ruleQuiz;
  const q = STATE.byId[target.qid] || { stem: "(question not in current bank)" };
  const wrap = $el("div");
  wrap.appendChild($el("div", { class: "small", html: `Original question:<br><i>${escapeHTML((q.stem || "").slice(0, 200))}</i>` }));
  wrap.appendChild($el("div", { style: "margin-top: 8px; font-weight: 600;", text: "What rule did you learn?" }));
  const list = $el("div", { class: "options", style: "margin-top: 6px;" });
  opts.forEach((o, i) => {
    const div = $el("div", { class: "opt" });
    div.appendChild($el("span", { class: "letter", text: ["A","B","C","D"][i] }));
    div.appendChild($el("span", { text: o.text }));
    div.addEventListener("click", () => answerRuleQuiz(o.id === target.id, target));
    list.appendChild(div);
  });
  wrap.appendChild(list);
  showModal("Rule Recall", wrap, [{ label: "Close", value: null }]).then(() => { STATE.ruleQuiz = null; });
}

function answerRuleQuiz(correct, target) {
  if (correct) target.box = Math.min(target.box + 1, RULE_BOX_MAX);
  else target.box = 1;
  target.lastSeen = nowIso();
  target.lastResult = correct ? "correct" : "wrong";
  saveAll();
  // Close any open modal.
  const overlay = document.querySelector(".modal-overlay");
  if (overlay) document.body.removeChild(overlay);
  alert(correct ? "Correct. Box up." : "Not quite. Back to box 1.");
  renderHome();
}
