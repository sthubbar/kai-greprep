// ==========================================================================
// Session
// ==========================================================================
function startSession(modeKey, customCfg) {
  // F5: "custom" mode supplies {length, minutes} via customCfg.
  let cfg;
  if (modeKey === "custom" && customCfg) {
    cfg = { label: "Custom", timed: true, length: customCfg.length, minutes: customCfg.minutes };
  } else if (modeKey === "bookmarks") {
    cfg = { label: "Bookmarks", timed: false, length: null };
  } else {
    cfg = MODES[modeKey] || MODES.practice;
  }
  const length = cfg.length || STATE.settings.length || 20;

  let ids;
  if (modeKey === "bookmarks") {
    // Bookmark session: untimed, capped at 20.
    ids = selectBookmarks(20);
    if (ids.length === 0) {
      APP.appendChild($el("div", { class: "errbox",
        text: "No bookmarked questions match the current topic filter." }));
      return;
    }
  } else if (STATE.testDay && daysToTest() != null && daysToTest() <= 14 && daysToTest() >= 0 && modeKey !== "mock" && modeKey !== "custom") {
    // Final-week takes precedence on weak-topic prioritization for non-mock modes.
    ids = selectFinalWeek(length);
  } else if (modeKey === "mock" || modeKey === "custom") {
    ids = selectRandom(length);
  } else {
    ids = selectAdaptive(length);
  }
  if (ids.length === 0) {
    APP.appendChild($el("div", { class: "errbox",
      text: "No questions available. Try clearing the topic filter." }));
    return;
  }

  const session = {
    mode: modeKey,
    timed: !!cfg.timed,
    minutes: cfg.minutes || null,
    length: ids.length,
    ids,
    idx: 0,
    answers: {},
    confirmed: {},
    marked: {},          // qid -> bool
    chats: {},           // qid -> [{role, content}]
    questionStartTs: nowIso(),
    startedAt: nowIso(),
    endsAt: cfg.timed ? new Date(Date.now() + cfg.minutes * 60 * 1000).toISOString() : null,
    completed: false,
    // F5: pause tracking. pausedAt = ISO timestamp while paused, else null. totalPausedMs accumulates.
    pausedAt: null,
    totalPausedMs: 0,
  };
  STATE.currentSession = session;
  persistSession();
  renderQuestion();
}

function resumeSession() {
  // Pick up exactly where left off.
  if (!STATE.currentSession) { renderHome(); return; }
  // For timed sessions, if endsAt has elapsed, autoend.
  if (STATE.currentSession.timed && STATE.currentSession.endsAt &&
      new Date(STATE.currentSession.endsAt).getTime() <= Date.now()) {
    endSession(true);
    return;
  }
  renderQuestion();
}

let timerInterval = null;
function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function renderQuestion() {
  clearTimer();
  clear(APP);
  const sess = STATE.currentSession;
  if (!sess || sess.idx >= sess.length) { endSession(); return; }

  const qid = sess.ids[sess.idx];
  const q = STATE.byId[qid];
  if (!q) {
    APP.appendChild($el("div", { class: "errbox", text: `Missing question ${qid}` }));
    return;
  }

  // Timer / pacing bar.
  if (sess.timed) {
    const tb = $el("div", { class: "timerbar" });
    const clock = $el("div", { class: "clock", id: "session-clock", text: "--:--" });
    const dot = $el("div", { class: "pace-dot green", id: "pace-dot" });
    const paceText = $el("div", { class: "small", id: "pace-text", text: "" });
    tb.appendChild(clock);
    tb.appendChild(dot);
    tb.appendChild(paceText);
    // F5: pause/resume button.
    const pauseBtn = $el("button", {
      class: sess.pausedAt ? "primary" : "ghost",
      text: sess.pausedAt ? "Resume" : "Pause",
      style: "margin-left: auto;",
      onclick: () => togglePause(),
    });
    tb.appendChild(pauseBtn);
    APP.appendChild(tb);
    if (!sess.pausedAt) {
      timerInterval = setInterval(() => updateClockUI(), 500);
    }
    updateClockUI();
  }

  const head = $el("div", { class: "card" + (sess.pausedAt ? " paused-dim" : "") });
  const headRow = $el("div", { class: "qhead" });
  headRow.appendChild($el("div", { class: "qnum",
    text: `Question ${sess.idx + 1} of ${sess.length}` }));

  const topicLine = $el("div", { class: "small" });
  for (const t of (q.topics || [])) topicLine.appendChild($el("span", { class: "pill", text: t }));
  const h = getH(qid);
  topicLine.appendChild($el("span", {
    class: "pill " + (h.bucket === "mastered" ? "good" : (h.bucket === "learning" ? "warn" : "")),
    text: h.bucket + (h.bucket === "learning" ? ` (box ${h.leitnerBox})` : ""),
  }));
  headRow.appendChild(topicLine);

  // Star bookmark.
  const bm = STATE.bookmarks[qid] || {};
  const star = $el("button", {
    class: "star-btn" + (bm.starred ? " starred" : ""),
    title: "Star bookmark",
    text: bm.starred ? "★" : "☆",
    onclick: () => toggleStar(qid),
  });
  headRow.appendChild(star);
  // F2: report error button.
  const reportBtn = $el("button", {
    class: "report-btn",
    title: "Report a problem with this question",
    text: "Report error",
    onclick: () => openReportErrorModal(qid),
  });
  headRow.appendChild(reportBtn);
  head.appendChild(headRow);

  const bar = $el("div", { class: "row" }, [
    $el("div", { class: "progressbar" }, [
      $el("div", { style: `width: ${100 * sess.idx / sess.length}%` }),
    ]),
  ]);
  head.appendChild(bar);

  const stem = $el("div", { class: "stem" });
  stem.innerHTML = safeMathHTML(q.stem || "");
  if (q.image) {
    const imgSrc = q.image.startsWith("images/") ? q.image : "images/" + q.image;
    const img = $el("img", { src: imgSrc, alt: q.image });
    stem.appendChild(img);
  }
  head.appendChild(stem);

  const optsBox = $el("div", { class: "options" });
  const letters = ["A", "B", "C", "D", "E"];
  const confirmed = !!sess.confirmed[qid];
  const userPick = sess.answers[qid] ? sess.answers[qid].chosen : null;

  // Per-session shuffled display order (Fisher-Yates). Stable per qid within
  // this session so reopening the same question shows the same order.
  if (!sess.shuffles) sess.shuffles = {};
  let order = sess.shuffles[qid];
  if (!order || order.length !== q.options.length) {
    order = q.options.map((_, i) => i);
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = order[i]; order[i] = order[j]; order[j] = tmp;
    }
    sess.shuffles[qid] = order;
    persistSession();
  }

  order.forEach((origIdx, displayIdx) => {
    const opt = q.options[origIdx];
    const div = $el("div", { class: "opt" });
    if (userPick === origIdx && !confirmed) div.classList.add("selected");
    if (confirmed) {
      if (origIdx === q.answer) div.classList.add(userPick === origIdx ? "correct" : "reveal-correct");
      else if (userPick === origIdx) div.classList.add("wrong");
    }
    div.appendChild($el("span", { class: "letter", text: letters[displayIdx] || String(displayIdx) }));
    const span = $el("span");
    span.innerHTML = safeMathHTML(opt);
    div.appendChild(span);
    if (!confirmed) {
      div.addEventListener("click", () => {
        sess.answers[qid] = { chosen: origIdx, correct: origIdx === q.answer };
        persistSession();
        renderQuestion();
      });
    }
    optsBox.appendChild(div);
  });
  head.appendChild(optsBox);

  // Action row.
  const actions = $el("div", { class: "row", style: "margin-top: 12px;" });
  if (!confirmed) {
    const confirmBtn = $el("button", {
      class: "primary", text: "Confirm answer",
      onclick: () => confirmAnswer(),
    });
    confirmBtn.disabled = userPick == null;
    actions.appendChild(confirmBtn);
    if (sess.timed) {
      actions.appendChild($el("button", {
        text: sess.marked[qid] ? "Marked" : "Skip and return",
        onclick: () => skipAndReturn(),
      }));
    }
  } else {
    const nextBtn = $el("button", {
      class: "primary",
      text: sess.idx + 1 >= sess.length ? "End session" : "Next question",
      onclick: () => advance(),
    });
    actions.appendChild(nextBtn);
    const ans = sess.answers[qid];
    if (ans) {
      // Tutor available after every confirmed answer (Kai feedback 2026-05-07).
      // Useful for "is there a faster way?" or "did I get this right for the right reason?".
      actions.appendChild($el("button", {
        text: "Open chat tutor",
        onclick: () => openChatTutor(qid),
      }));
    }
  }
  // Mark for review.
  if (sess.timed) {
    actions.appendChild($el("button", {
      class: sess.marked[qid] ? "primary" : "ghost",
      text: sess.marked[qid] ? "Unmark" : "Mark for review",
      onclick: () => { sess.marked[qid] = !sess.marked[qid]; persistSession(); renderQuestion(); },
    }));
  }
  head.appendChild(actions);

  if (confirmed) {
    const ans = sess.answers[qid];
    const fb = $el("div", { class: "feedback " + (ans.correct ? "good" : "bad") });
    fb.innerHTML = (ans.correct
      ? "Correct."
      : `Not quite. The correct answer is highlighted.`);
    if (q.explanation) {
      const exp = $el("div", { style: "margin-top: 6px;" });
      exp.innerHTML = safeMathHTML(q.explanation);
      fb.appendChild(exp);
    }
    head.appendChild(fb);
  }

  // Chat tutor panel if active.
  if (sess.chats[qid] && sess.chats[qid].length > 0) {
    head.appendChild(renderChatPanel(qid));
  }

  // Note area.
  const noteWrap = $el("div", { style: "margin-top: 10px;" });
  noteWrap.appendChild($el("div", { class: "small", text: "Personal note (max 500 chars):" }));
  const noteArea = $el("textarea", { class: "note-area", maxlength: "500" });
  noteArea.value = (STATE.bookmarks[qid] && STATE.bookmarks[qid].note) || "";
  noteArea.addEventListener("change", () => updateNote(qid, noteArea.value));
  noteArea.addEventListener("blur", () => updateNote(qid, noteArea.value));
  noteWrap.appendChild(noteArea);
  head.appendChild(noteWrap);

  APP.appendChild(head);

  const foot = $el("div", { class: "row between small" });
  foot.appendChild($el("span", { text: `Mode: ${sess.mode}` }));
  foot.appendChild($el("button", {
    class: "ghost", text: "End session early",
    onclick: () => endSession(),
  }));
  APP.appendChild(foot);

  renderMath(APP);
  updateHeader();
}

function updateClockUI() {
  const sess = STATE.currentSession;
  if (!sess || !sess.timed) return;
  const clock = document.getElementById("session-clock");
  const dot = document.getElementById("pace-dot");
  const paceText = document.getElementById("pace-text");
  if (!clock) return;
  // F5: while paused, the displayed remaining freezes at the value captured when pause started.
  if (sess.pausedAt) {
    const frozenRemaining = Math.max(0, Math.floor(
      (new Date(sess.endsAt).getTime() - new Date(sess.pausedAt).getTime()) / 1000));
    clock.textContent = fmtMMSS(frozenRemaining) + " (paused)";
    if (dot) dot.className = "pace-dot";
    if (paceText) paceText.textContent = "paused";
    return;
  }
  const remaining = Math.max(0, Math.floor((new Date(sess.endsAt).getTime() - Date.now()) / 1000));
  clock.textContent = fmtMMSS(remaining);
  // Pacing: expected idx = (elapsed / total) * length, excluding paused time.
  const totalSec = sess.minutes * 60;
  const elapsed = totalSec - remaining;
  const expectedIdx = (elapsed / totalSec) * sess.length;
  const behind = expectedIdx - sess.idx;
  let cls = "green", txt = "on pace";
  if (behind >= 3) { cls = "red"; txt = `${behind.toFixed(1)} behind`; }
  else if (behind >= 1) { cls = "yellow"; txt = `${behind.toFixed(1)} behind`; }
  else if (behind <= -1) { txt = "ahead"; }
  if (dot) dot.className = "pace-dot " + cls;
  if (paceText) paceText.textContent = txt;

  if (remaining <= 0) {
    clearTimer();
    endSession(true);
  }
}

// F5: toggle pause for a timed session.
function togglePause() {
  const sess = STATE.currentSession;
  if (!sess || !sess.timed) return;
  if (sess.pausedAt) {
    // Resume: extend endsAt by the paused duration so the player keeps the same time budget.
    const pauseMs = Date.now() - new Date(sess.pausedAt).getTime();
    sess.totalPausedMs = (sess.totalPausedMs || 0) + pauseMs;
    sess.endsAt = new Date(new Date(sess.endsAt).getTime() + pauseMs).toISOString();
    sess.pausedAt = null;
    // Also reset questionStartTs so the per-question time isn't polluted by the pause.
    sess.questionStartTs = nowIso();
  } else {
    sess.pausedAt = nowIso();
  }
  persistSession();
  renderQuestion();
}

function skipAndReturn() {
  const sess = STATE.currentSession;
  if (!sess) return;
  const qid = sess.ids[sess.idx];
  sess.marked[qid] = true;
  // Move this idx to the end (if not already answered).
  const list = sess.ids;
  const tail = list.splice(sess.idx, 1);
  list.push(tail[0]);
  // Don't increment idx; next iteration shows the new question at this index.
  persistSession();
  renderQuestion();
}

function confirmAnswer() {
  const sess = STATE.currentSession;
  const qid = sess.ids[sess.idx];
  const q = STATE.byId[qid];
  const ans = sess.answers[qid];
  if (!ans) return;
  sess.confirmed[qid] = true;
  const startTs = sess.questionStartTs ? new Date(sess.questionStartTs).getTime() : null;
  const timeSec = startTs ? Math.round((Date.now() - startTs) / 1000) : null;
  recordAttempt(qid, ans.chosen, ans.correct, sess.mode, timeSec);
  persistSession();
  renderQuestion();
  // Wrong-answer pattern check.
  if (!ans.correct) maybeRunPatternDetection();
}

function advance() {
  const sess = STATE.currentSession;
  if (!sess) return;
  if (sess.idx + 1 >= sess.length) { endSession(); return; }
  sess.idx += 1;
  sess.questionStartTs = nowIso();
  persistSession();
  renderQuestion();
}

function toggleStar(qid) {
  if (!STATE.bookmarks[qid]) STATE.bookmarks[qid] = { starred: false, note: "" };
  STATE.bookmarks[qid].starred = !STATE.bookmarks[qid].starred;
  saveAll();
  if (STATE.currentSession) renderQuestion(); else renderHome();
}
function updateNote(qid, text) {
  if (!STATE.bookmarks[qid]) STATE.bookmarks[qid] = { starred: false, note: "" };
  STATE.bookmarks[qid].note = (text || "").slice(0, 500);
  saveAll();
}

// ==========================================================================
// Chat tutor
// ==========================================================================
async function openChatTutor(qid) {
  const sess = STATE.currentSession;
  if (!sess) return;
  let pw = getPassword();
  if (!pw) pw = await showPasswordModal();
  const persisted = loadChat(qid);
  if (persisted && persisted.length > 0 && (!sess.chats[qid] || sess.chats[qid].length === 0)) {
    sess.chats[qid] = persisted;
  }
  if (!sess.chats[qid]) sess.chats[qid] = [];
  // Send first turn automatically: user message asking for the teaching.
  if (sess.chats[qid].length === 0) {
    sess.chats[qid].push({
      role: "user",
      content: "I got this question wrong. Teach me the rule I need so I can solve this family of problems next time.",
    });
    persistSession();
    saveChat(qid, sess.chats[qid]);
    renderQuestion();
    await callChatTurn(qid);
  } else {
    renderQuestion();
  }
}

function renderChatPanel(qid) {
  const sess = STATE.currentSession;
  const q = STATE.byId[qid];
  const ans = sess.answers[qid];
  const panel = $el("div", { class: "chat-panel" });

  const ctx = $el("details", { class: "chat-context" });
  ctx.appendChild($el("summary", { text: "Question context (collapsed)" }));
  const ctxBody = $el("div");
  ctxBody.innerHTML = `<div style="margin-top:6px;"><b>Q:</b> ${safeMathHTML(q.stem || "")}</div>` +
    `<div><b>You picked:</b> ${safeMathHTML(q.options[ans.chosen] || "")}</div>` +
    `<div><b>Correct:</b> ${safeMathHTML(q.options[q.answer] || "")}</div>`;
  ctx.appendChild(ctxBody);
  panel.appendChild(ctx);

  const msgs = $el("div", { class: "chat-msgs" });
  for (const m of (sess.chats[qid] || [])) {
    const div = $el("div", { class: "chat-msg " + m.role });
    div.appendChild($el("div", { class: "who", text: m.role === "user" ? "you" : "claude" }));
    const body = $el("div");
    body.innerHTML = m.content;
    div.appendChild(body);
    msgs.appendChild(div);
  }
  panel.appendChild(msgs);

  const inp = $el("textarea", { class: "chat-input", placeholder: "Ask a follow-up..." });
  panel.appendChild(inp);
  const row = $el("div", { class: "row", style: "margin-top: 8px;" });
  row.appendChild($el("button", {
    class: "primary", text: "Send",
    onclick: async () => {
      const text = inp.value.trim();
      if (!text) return;
      sess.chats[qid].push({ role: "user", content: text });
      persistSession();
      saveChat(qid, sess.chats[qid]);
      inp.value = "";
      renderQuestion();
      await callChatTurn(qid);
    },
  }));
  row.appendChild($el("button", {
    text: "Generate 3 similar problems",
    onclick: () => generateSimilar(qid),
  }));
  row.appendChild($el("button", {
    class: "ghost", text: "Clear chat",
    onclick: () => {
      if (!confirm("Clear this conversation?")) return;
      sess.chats[qid] = [];
      clearChat(qid);
      persistSession();
      renderQuestion();
    },
  }));
  panel.appendChild(row);

  // Generated mini-quiz, if any.
  if (sess.chats[qid] && sess.chats[qid]._generated) {
    panel.appendChild(renderGeneratedMiniQuiz(qid));
  }

  // After render, KaTeX re-render.
  setTimeout(() => renderMath(panel), 30);
  return panel;
}

async function callChatTurn(qid) {
  const sess = STATE.currentSession;
  if (!sess) return;
  const q = STATE.byId[qid];
  const ans = sess.answers[qid];
  let pw = getPassword();
  if (!pw) pw = await showPasswordModal();

  // Pending placeholder.
  sess.chats[qid].push({ role: "assistant", content: "thinking..." });
  persistSession();
  renderQuestion();

  try {
    const messages = sess.chats[qid].slice(0, -1).map(m => ({ role: m.role, content: m.content }));
    const resp = await fetch(TUTOR_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        mode: "chat",
        context: {
          question: q.stem,
          choices: q.options,
          wrongChoice: ans ? q.options[ans.chosen] : "",
          correctChoice: q.options[q.answer],
        },
        messages,
        password: pw,
      }),
    });
    if (resp.status === 401) {
      clearPassword();
      sess.chats[qid][sess.chats[qid].length - 1].content = "Wrong password. Click Send again to retry.";
    } else if (!resp.ok) {
      const text = await resp.text();
      sess.chats[qid][sess.chats[qid].length - 1].content = `Tutor error (${resp.status}): ${escapeHTML(text).slice(0, 300)}`;
    } else {
      const j = await resp.json();
      const reply = j.reply || j.teaching || "(empty)";
      sess.chats[qid][sess.chats[qid].length - 1].content = reply;
      // Extract & store rule.
      const rule = extractRule(reply);
      if (rule) recordRule(qid, rule);
    }
  } catch (e) {
    sess.chats[qid][sess.chats[qid].length - 1].content = `Could not reach the tutor service. ${escapeHTML(e.message || "")}`;
  }
  persistSession();
  saveChat(qid, sess.chats[qid]);
  renderQuestion();
}

async function generateSimilar(qid) {
  const sess = STATE.currentSession;
  if (!sess) return;
  const q = STATE.byId[qid];
  let pw = getPassword();
  if (!pw) pw = await showPasswordModal();

  if (!sess.chats[qid]) sess.chats[qid] = [];
  sess.chats[qid].push({ role: "assistant", content: "Generating 3 similar problems..." });
  persistSession();
  renderQuestion();

  try {
    const resp = await fetch(GENERATE_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        source: {
          question: q.stem,
          choices: q.options,
          correctChoice: q.options[q.answer],
          topics: q.topics || [],
        },
        password: pw,
      }),
    });
    if (resp.status === 401) {
      clearPassword();
      sess.chats[qid][sess.chats[qid].length - 1].content = "Wrong password.";
    } else if (!resp.ok) {
      const text = await resp.text();
      sess.chats[qid][sess.chats[qid].length - 1].content = `Generator error (${resp.status}): ${escapeHTML(text).slice(0, 300)}`;
    } else {
      const j = await resp.json();
      sess.chats[qid].pop();
      sess.chats[qid].push({ role: "assistant", content: "Three similar problems generated below." });
      sess.chats[qid]._generated = j.questions.map(g => ({
        ...g,
        chosen: null,
        confirmed: false,
      }));
    }
  } catch (e) {
    sess.chats[qid][sess.chats[qid].length - 1].content = `Generator failed. ${escapeHTML(e.message || "")}`;
  }
  persistSession();
  saveChat(qid, sess.chats[qid]);
  renderQuestion();
}

function renderGeneratedMiniQuiz(qid) {
  const sess = STATE.currentSession;
  const arr = sess.chats[qid]._generated || [];
  const wrap = $el("div", { style: "margin-top: 10px;" });
  wrap.appendChild($el("h3", { text: "Mini-quiz: 3 similar problems" }));
  const letters = ["A","B","C","D","E"];
  arr.forEach((g, gi) => {
    const card = $el("div", { class: "gen-q" + (g.confirmed ? (g.chosen === g.correct_answer ? " correct" : " wrong") : "") });
    const stem = $el("div");
    stem.innerHTML = `<b>${gi + 1}.</b> ` + safeMathHTML(g.question || "");
    card.appendChild(stem);
    g.choices.forEach((c, ci) => {
      const o = $el("div", { class: "opt", style: "margin-top:4px;" });
      if (g.chosen === ci && !g.confirmed) o.classList.add("selected");
      if (g.confirmed) {
        if (ci === g.correct_answer) o.classList.add("reveal-correct");
        else if (g.chosen === ci) o.classList.add("wrong");
      }
      o.appendChild($el("span", { class: "letter", text: letters[ci] || String(ci) }));
      const sp = $el("span"); sp.innerHTML = safeMathHTML(c); o.appendChild(sp);
      if (!g.confirmed) {
        o.addEventListener("click", () => { g.chosen = ci; persistSession(); saveChat(qid, sess.chats[qid]); renderQuestion(); });
      }
      card.appendChild(o);
    });
    if (!g.confirmed) {
      const btn = $el("button", { class: "primary", text: "Submit", style: "margin-top:6px;",
        onclick: () => { g.confirmed = true; persistSession(); saveChat(qid, sess.chats[qid]); renderQuestion(); } });
      btn.disabled = g.chosen == null;
      card.appendChild(btn);
    } else {
      const fb = $el("div", { class: "feedback " + (g.chosen === g.correct_answer ? "good" : "bad") });
      fb.innerHTML = (g.chosen === g.correct_answer ? "Correct." :
        `Not quite. The correct answer is highlighted.`) +
        (g.explanation ? `<div style="margin-top:6px;">${safeMathHTML(g.explanation)}</div>` : "");
      card.appendChild(fb);
    }
    wrap.appendChild(card);
  });
  setTimeout(() => renderMath(wrap), 30);
  return wrap;
}

// ==========================================================================
// End session
// ==========================================================================
function endSession(timedOut) {
  clearTimer();
  const sess = STATE.currentSession;
  if (!sess) { renderHome(); return; }

  // Early-end behavior: if the user is mid-question (an option is highlighted but
  // not Confirmed), do NOT record the current qid. Strip any unconfirmed entries
  // from sess.answers so the session summary, accuracy, Leitner, and pattern
  // detection treat the question as never-seen. recordAttempt was never called
  // for it because that only fires inside confirmAnswer().
  for (const qid of Object.keys(sess.answers || {})) {
    if (!(sess.confirmed && sess.confirmed[qid])) {
      delete sess.answers[qid];
    }
  }

  let correct = 0, wrong = 0, answered = 0;
  for (const qid of sess.ids) {
    const ans = sess.answers[qid];
    if (!ans) continue;
    answered += 1;
    if (ans.correct) correct += 1; else wrong += 1;
  }
  const total = sess.length;
  const ets = etsScaledScore(correct, total);

  const summary = {
    startedAt: sess.startedAt,
    endedAt: nowIso(),
    mode: sess.mode,
    timed: !!sess.timed,
    length: sess.length,
    answered, correct, wrong,
    ids: sess.ids.slice(),
    marked: Object.keys(sess.marked).filter(k => sess.marked[k]),
    timedOut: !!timedOut,
    etsScaled: ets,
    totalPausedMs: sess.totalPausedMs || 0,
  };
  STATE.sessions.push(summary);
  saveAll();
  STATE.currentSession = null;
  persistSession();

  // Render summary screen.
  clear(APP);
  const card = $el("div", { class: "card" });
  card.appendChild($el("h2", { text: "Session summary" }));
  card.appendChild($el("div", { html:
    `<b>${correct} / ${answered}</b> correct of ${answered} answered (${total} delivered). ` +
    (ets ? `<span class="pill accent">ETS-equivalent: ${ets}</span>` : "") +
    (timedOut ? ` <span class="pill bad">time expired</span>` : "")
  }));

  // Sticky-on-top action row so the Home button is reachable without scrolling
  // past the per-topic and per-question lists (Steve directive 2026-06-04).
  const topActions = $el("div", { class: "row", style: "margin: 10px 0 6px 0;" });
  topActions.appendChild($el("button", { class: "primary", text: "Home", onclick: () => renderHome() }));
  topActions.appendChild($el("button", { text: "Export PDF", onclick: () => exportSessionPDF(summary) }));
  card.appendChild(topActions);

  if (summary.marked.length) {
    card.appendChild($el("h3", { text: "Marked for review" }));
    const ul = $el("ul"); for (const id of summary.marked) {
      const q = STATE.byId[id]; const li = $el("li");
      li.innerHTML = `<b>${id}</b>: ${escapeHTML((q && q.stem || "").slice(0, 120))}`;
      ul.appendChild(li);
    } card.appendChild(ul);
  }

  // Per-topic breakdown.
  const byTopic = {};
  for (const id of sess.ids) {
    const ans = sess.answers[id]; if (!ans) continue;
    const q = STATE.byId[id]; if (!q) continue;
    for (const t of (q.topics || [])) {
      if (!byTopic[t]) byTopic[t] = { c: 0, n: 0 };
      byTopic[t].n += 1; if (ans.correct) byTopic[t].c += 1;
    }
  }
  if (Object.keys(byTopic).length) {
    // Collapse Topic breakdown like Missed questions, so the summary stays
    // compact on phone. Steve directive 2026-06-04.
    const det = $el("details", { style: "margin-top: 10px;" });
    const sum = $el("summary", { style: "cursor: pointer; font-weight: 600; font-size: 1.05em;",
      text: `Topic breakdown (${Object.keys(byTopic).length})` });
    det.appendChild(sum);
    const ul = $el("ul");
    for (const [t, v] of Object.entries(byTopic).sort()) {
      const li = $el("li", { html: `<b>${t}</b>: ${v.c}/${v.n}` });
      ul.appendChild(li);
    }
    det.appendChild(ul);
    card.appendChild(det);
  }

  // Missed questions, collapsed by default. On a long session this list can
  // dominate the summary screen, especially on phones. Steve directive 2026-06-04.
  const missed = sess.ids.filter(id => sess.answers[id] && !sess.answers[id].correct);
  if (missed.length) {
    const det = $el("details", { style: "margin-top: 10px;" });
    const sum = $el("summary", { style: "cursor: pointer; font-weight: 600; font-size: 1.05em;",
      text: `Missed questions (${missed.length})` });
    det.appendChild(sum);
    const ul = $el("ul", { class: "qsublist" });
    for (const id of missed) {
      const q = STATE.byId[id]; const li = $el("li");
      li.innerHTML = `<b>${id}</b><div class="qmeta">${escapeHTML((q && q.stem || "").slice(0, 200))}</div>` +
        `<div class="qmeta"><b>Why:</b> ${q && q.explanation ? q.explanation : "see explanation in question."}</div>`;
      ul.appendChild(li);
    }
    det.appendChild(ul);
    card.appendChild(det);
  }

  const row = $el("div", { class: "row", style: "margin-top: 14px;" });
  row.appendChild($el("button", { class: "primary", text: "Home", onclick: () => renderHome() }));
  row.appendChild($el("button", { text: "Export to PDF", onclick: () => exportSessionPDF(summary) }));
  row.appendChild($el("button", { text: "Download stats (jsonl)", onclick: () => downloadStats() }));
  row.appendChild($el("button", { class: "ghost", text: "Reset all progress (this profile)", onclick: () => resetProgress() }));
  card.appendChild(row);
  APP.appendChild(card);
  renderMath(APP);
}

function downloadStats() {
  const lines = STATE.log.map(r => JSON.stringify(r)).join("\n") + "\n";
  const blob = new Blob([lines], { type: "application/x-ndjson" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `attempts-${STATE.activeProfile}.jsonl`;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 0);
}
function resetProgress() {
  if (!confirm("Erase ALL progress for profile '" + STATE.activeProfile + "'? Cannot be undone.")) return;
  for (const k of ["history","log","sessions","settings","bookmarks","rules","patterns",
                    "patterns_history","testday","session.current","topic_filter","custom_mode"]) {
    try { localStorage.removeItem(profileKey(k)); } catch (e) {}
  }
  // Also clear chat keys for this profile.
  const prefix = "profile:" + STATE.activeProfile + ":chat:";
  const toDel = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(prefix)) toDel.push(k);
  }
  for (const k of toDel) localStorage.removeItem(k);
  loadProfileData();
  renderHome();
}

// ==========================================================================
// PDF export, lazy-load jsPDF.
// ==========================================================================
let jsPdfLoading = null;
function ensureJsPDF() {
  if (window.jspdf && window.jspdf.jsPDF) return Promise.resolve();
  if (jsPdfLoading) return jsPdfLoading;
  jsPdfLoading = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js";
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
  return jsPdfLoading;
}

async function exportSessionPDF(summary) {
  await ensureJsPDF();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "pt", format: "letter" });
  const margin = 50; let y = margin;
  const lineH = 14; const w = doc.internal.pageSize.getWidth() - 2 * margin;

  function writeLine(txt, opts) {
    if (y > doc.internal.pageSize.getHeight() - margin) { doc.addPage(); y = margin; }
    doc.setFontSize((opts && opts.size) || 11);
    doc.setFont("helvetica", (opts && opts.bold) ? "bold" : "normal");
    const wrapped = doc.splitTextToSize(txt, w);
    for (const ln of wrapped) {
      if (y > doc.internal.pageSize.getHeight() - margin) { doc.addPage(); y = margin; }
      doc.text(ln, margin, y); y += lineH;
    }
  }

  writeLine("GRE Math Subject Test, session report", { size: 16, bold: true }); y += 6;
  writeLine("Profile: " + STATE.activeProfile);
  writeLine("Date: " + summary.startedAt.slice(0, 10) + " to " + summary.endedAt.slice(11, 19));
  writeLine("Mode: " + summary.mode + (summary.timed ? " (timed)" : " (untimed)"));
  writeLine("Score: " + summary.correct + " / " + summary.answered + " of " + summary.length + " delivered. ETS-equivalent: " + (summary.etsScaled || "n/a"));
  y += 4;

  // Topic breakdown computed from log entries within the session window.
  writeLine("Topic breakdown", { bold: true });
  const counts = {};
  for (const id of summary.ids) {
    const q = STATE.byId[id]; if (!q) continue;
    const entries = STATE.log.filter(e => e.qid === id && e.ts >= summary.startedAt && e.ts <= summary.endedAt);
    if (entries.length === 0) continue;
    const last = entries[entries.length - 1];
    for (const t of (q.topics || [])) {
      if (!counts[t]) counts[t] = { c: 0, n: 0 };
      counts[t].n += 1; if (last.correct) counts[t].c += 1;
    }
  }
  for (const [t, v] of Object.entries(counts).sort()) writeLine("- " + t + ": " + v.c + "/" + v.n);
  y += 4;

  // Missed questions.
  writeLine("Missed questions", { bold: true });
  const missed = summary.ids.filter(id => {
    const entries = STATE.log.filter(e => e.qid === id && e.ts >= summary.startedAt && e.ts <= summary.endedAt);
    return entries.length && !entries[entries.length - 1].correct;
  });
  if (missed.length === 0) writeLine("(none)");
  for (const id of missed) {
    const q = STATE.byId[id];
    writeLine(id + ": " + (q.stem || "").replace(/\\\(/g, "(").replace(/\\\)/g, ")"), { bold: true });
    if (q.explanation) writeLine("Explanation: " + q.explanation.replace(/\\\(/g, "(").replace(/\\\)/g, ")"));
    y += 2;
  }

  // Rules learned in this profile.
  writeLine("Rules in this profile", { bold: true });
  const rules = Object.values(STATE.rules);
  if (rules.length === 0) writeLine("(none yet)");
  for (const r of rules) writeLine("[box " + r.box + "] " + r.text);

  doc.save("gre-session-" + STATE.activeProfile + "-" + summary.startedAt.slice(0, 10) + ".pdf");
}

// ==========================================================================
// Keyboard shortcuts during a session.
// ==========================================================================
document.addEventListener("keydown", (ev) => {
  const sess = STATE.currentSession;
  if (!sess) return;
  const tag = (ev.target && ev.target.tagName) || "";
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
  const qid = sess.ids[sess.idx];
  const q = STATE.byId[qid]; if (!q) return;
  const confirmed = !!sess.confirmed[qid];
  // F5: while paused, swallow gameplay keys.
  if (sess.pausedAt) return;

  if (!confirmed && ev.key >= "1" && ev.key <= "5") {
    const displayIdx = Number(ev.key) - 1;
    const order = (sess.shuffles && sess.shuffles[qid]) || q.options.map((_, k) => k);
    if (displayIdx < order.length) {
      const origIdx = order[displayIdx];
      sess.answers[qid] = { chosen: origIdx, correct: origIdx === q.answer };
      persistSession();
      renderQuestion();
    }
    ev.preventDefault();
    return;
  }
  if (ev.key === "Enter") {
    if (!confirmed && sess.answers[qid]) { confirmAnswer(); ev.preventDefault(); }
    else if (confirmed) { advance(); ev.preventDefault(); }
    return;
  }
  if (confirmed && ev.key === " ") {
    advance(); ev.preventDefault(); return;
  }
  if (confirmed && (ev.key === "t" || ev.key === "T")) {
    openChatTutor(qid); ev.preventDefault(); return;
  }
  if (ev.key === "m" || ev.key === "M") {
    sess.marked[qid] = !sess.marked[qid]; persistSession(); renderQuestion();
    ev.preventDefault(); return;
  }
  if (ev.key === "s" || ev.key === "S") {
    toggleStar(qid); ev.preventDefault(); return;
  }
  if (ev.key === "n" || ev.key === "N") {
    const noteArea = document.querySelector(".note-area");
    if (noteArea) { noteArea.focus(); ev.preventDefault(); }
    return;
  }
});

// ==========================================================================
// Profile picker + boot.
// ==========================================================================
async function pickInitialProfile() {
  let active = lsLoad(LS_GLOBAL_ACTIVE, null);
  if (active) { STATE.activeProfile = active; return; }
  const list = getProfiles();
  const wrap = $el("div");
  wrap.appendChild($el("div", { class: "small", text: "Pick a profile.", style: "margin-bottom: 8px;" }));
  const sel = $el("select", { style: "width: 100%; padding: 8px;" });
  for (const p of list) sel.appendChild($el("option", { value: p.name, text: p.name }));
  wrap.appendChild(sel);
  const newBox = $el("div", { style: "margin-top: 8px;" });
  newBox.appendChild($el("div", { class: "small", text: "Or add a new profile:" }));
  const newInput = $el("input", { type: "text", placeholder: "name (lowercase)" });
  newBox.appendChild(newInput);
  wrap.appendChild(newBox);
  const choice = await showModal("Welcome", wrap, [
    { label: "Add", value: "add" },
    { label: "Use selected", value: "use", primary: true },
  ]);
  if (choice === "add" && newInput.value.trim()) {
    const n = addProfile(newInput.value);
    if (n) { STATE.activeProfile = n; lsSave(LS_GLOBAL_ACTIVE, n); return; }
  }
  STATE.activeProfile = sel.value || "kai";
  lsSave(LS_GLOBAL_ACTIVE, STATE.activeProfile);
}

async function boot() {
  await pickInitialProfile();
  loadProfileData();
  if (!getPassword()) await showPasswordModal();
  try {
    const resp = await fetch(QUESTIONS_URL, { cache: "no-store" });
    if (!resp.ok) throw new Error("fetch " + QUESTIONS_URL + " -> " + resp.status);
    STATE.questions = await resp.json();
  } catch (e) {
    APP.appendChild($el("div", { class: "errbox", html:
      "Could not load <code>" + QUESTIONS_URL + "</code>. " + e }));
    return;
  }
  for (const q of STATE.questions) STATE.byId[q.id] = q;
  updateHeader();
  renderHome();
}

boot();
