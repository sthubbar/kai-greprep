name: Validate bank and deploy assets

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate question bank
        run: python3 scripts/validate_bank.py

      - name: Check index.html ends with </html>
        run: |
          tail -c 200 index.html | grep -q '</html>' || (echo "index.html does not end with </html>" && exit 1)

      - name: Check Netlify functions parse
        run: |
          for f in netlify/functions/*.js; do
            node --check "$f" || (echo "Function $f failed to parse" && exit 1)
          done

      - name: Verify two-copy hash if Question Bank submodule present
        run: |
          if [ -f Question_Bank/questions.json ]; then
            a=$(md5sum questions.json | cut -d' ' -f1)
            b=$(md5sum Question_Bank/questions.json | cut -d' ' -f1)
            if [ "$a" != "$b" ]; then
              echo "questions.json md5 mismatch between deploy copy and Question Bank copy"
              echo "deploy:  $a"
              echo "bank:    $b"
              exit 1
            fi
          fi

  smoke-test-live:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for Netlify deploy to publish
        run: sleep 30

      - name: Smoke-test live questions.json
        run: |
          curl -sf https://kai-greprep.netlify.app/questions.json > /tmp/live.json || (echo "live fetch failed" && exit 1)
          python3 -c "import json; d=json.load(open('/tmp/live.json')); assert len(d) >= 330, f'expected >=330 questions, got {len(d)}'; print(f'live count OK: {len(d)}')"

      - name: Smoke-test health endpoint
        run: |
          curl -sf https://kai-greprep.netlify.app/.netlify/functions/health > /tmp/health.json || (echo "health fetch failed" && exit 1)
          python3 -c "import json; d=json.load(open('/tmp/health.json')); assert d.get('hasKey'), 'API key missing'; assert d.get('hasPassword'), 'password missing'; print('health OK')"
